name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel older runs of the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # MySQL real (no SQLite): algunos endpoints usan SQL específico de MySQL
      # (json_unquote, ->> path operator) que no tiene equivalente en SQLite —
      # sin esto, esos endpoints no pueden tener un test de integración real.
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: chatbot_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/ --output-format github

      - name: Run pytest
        env:
          SECRET_KEY: ci-secret-key-not-for-prod
          DATABASE_URL: "mysql+aiomysql://root:root@127.0.0.1:3306/chatbot_test"
          REDIS_URL: "redis://localhost:6379/15"
        run: pytest tests/ -q --cov=app --cov-report=term-missing

  frontend-unit:
    name: Frontend unit (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx next lint --no-cache --max-warnings 0 2>/dev/null || echo "Lint warnings found (non-blocking)"
      - run: npm test

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend-unit]

    steps:
      - uses: actions/checkout@v4

      - name: Create backend .env for CI
        # docker-compose.yml declara `env_file: ./backend/.env` en el servicio
        # backend — Compose exige que el archivo exista físicamente (a
        # diferencia de las variables sueltas, que sí tienen fallback ${VAR:-...}
        # en el propio compose). No son secretos reales, solo lo mínimo para
        # que el backend arranque en modo development dentro del contenedor.
        run: |
          {
            echo "SECRET_KEY=ci-secret-key-not-for-prod-but-32-chars-long"
            echo "ENVIRONMENT=development"
            echo "DEBUG=false"
            echo "FIRST_ADMIN_EMAIL=admin@example.com"
            echo "FIRST_ADMIN_PASSWORD=ci-admin-pass-1234"
            echo 'ALLOWED_ORIGINS=["http://localhost", "http://localhost:3000"]'
            echo "WIDGET_BASE_URL=http://localhost:8000"
          } > backend/.env

      - name: Bring up the stack
        run: docker compose up -d --wait mysql redis qdrant backend frontend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v
