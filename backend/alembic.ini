# Configuración genérica para una sola base de datos.

[alembic]
# ruta a los scripts de migración
# usa barras inclinadas (/) también en Windows para una ruta independiente del SO
script_location = alembic

# plantilla usada para generar los nombres de los archivos de migración; el valor
# por defecto es %%(rev)s_%%(slug)s
# descomenta la línea de abajo si quieres que los archivos lleven fecha y hora
# ver https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
# para todos los tokens disponibles
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# ruta de sys.path, se antepone a sys.path si está presente.
# por defecto es el directorio de trabajo actual.
prepend_sys_path = .

# zona horaria a usar al renderizar la fecha dentro del archivo de migración
# así como en el nombre del archivo.
# si se especifica, requiere python>=3.9 o la librería backports.zoneinfo.
# las dependencias requeridas se instalan añadiendo `alembic[tz]` a los requisitos pip
# el valor de la cadena se pasa a ZoneInfo()
# dejar en blanco para la hora local
# timezone =

# longitud máxima de caracteres a aplicar al campo "slug"
# truncate_slug_length = 40

# poner a 'true' para ejecutar el entorno durante
# el comando 'revision', independientemente de autogenerate
# revision_environment = false

# poner a 'true' para permitir que archivos .pyc y .pyo sin
# un archivo .py fuente sean detectados como revisiones en el
# directorio versions/
# sourceless = false

# especificación de ubicación de versiones; por defecto es
# alembic/versions. Al usar múltiples directorios de
# versiones, las revisiones iniciales deben indicarse con --version-path.
# el separador de ruta usado aquí debe ser el indicado por "version_path_separator" abajo.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# separador de ruta de versiones; como se mencionó arriba, es el carácter usado para
# dividir version_locations. el valor por defecto en los archivos alembic.ini nuevos es
# "os", que usa os.pathsep. Si se omite esta clave del todo, vuelve al comportamiento
# heredado de dividir por espacios y/o comas.
# los valores válidos para version_path_separator son:
#
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = space
# version_path_separator = newline
version_path_separator = os  # Usa os.pathsep. Configuración por defecto para proyectos nuevos.

# poner a 'true' para buscar archivos fuente recursivamente
# en cada directorio "version_locations"
# nuevo en Alembic versión 1.10
# recursive_version_locations = false

# la codificación de salida usada cuando los archivos de revisión
# se escriben desde script.py.mako
# output_encoding = utf-8

sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# post_write_hooks define scripts o funciones Python que se ejecutan
# sobre los scripts de revisión recién generados. Ver la documentación para más
# detalle y ejemplos

# formatear con "black" - usa el runner console_scripts, contra el entrypoint "black"
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# lint con intento de corregir usando "ruff" - usa el runner exec, ejecuta un binario
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

# Configuración de logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
