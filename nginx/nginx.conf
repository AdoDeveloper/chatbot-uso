upstream backend  { server backend:8000;  keepalive 32; }
upstream frontend { server frontend:3000; keepalive 16; }

# ── Compresión ────────────────────────────────────────────────────────────────
# Reduce el peso del bundle del panel Next.js y las respuestas JSON de la API.
gzip              on;
gzip_vary         on;
gzip_comp_level   5;
gzip_min_length   1024;
gzip_proxied      any;
gzip_types        text/plain text/css application/json application/javascript
                  text/javascript application/xml application/xml+rss image/svg+xml;

# ── Rate limiting a nivel nginx (defensa en profundidad) ──────────────────────
# Complementa el rate-limit por Redis del backend. Si Redis cae (fail-open en
# la app), esta capa sigue frenando abusos groseros sobre login y chat.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=chat_zone:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    # ADVERTENCIA PRODUCCIÓN: este server atiende en HTTP claro.
    # Antes de exponer al público:
    #   1. Obtén certificados: certbot certonly --standalone -d tu-dominio.com
    #   2. Descomenta el bloque `server { listen 443 ssl; }` al final del archivo.
    #   3. Reemplaza el contenido de este server por:
    #        return 301 https://$host$request_uri;
    #   4. Descomenta la línea Strict-Transport-Security más abajo.
    #   5. nginx -t && docker compose exec nginx nginx -s reload
    # Ver docs/DEPLOYMENT.md §HTTPS para el procedimiento completo.

    # Permite subir archivos de hasta 55 MB (backend acepta 50 MB de fuentes)
    client_max_body_size 55m;

    # ── Security headers ──────────────────────────────────────────────────────
    # OJO nginx: un `add_header` dentro de un location anula TODOS los headers
    # heredados de este nivel (pasa en /widget/ con Cache-Control).
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header X-XSS-Protection        "0"               always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    # CSP base: bloquea scripts/estilos de orígenes externos. Next.js necesita
    # 'unsafe-inline' (scripts de hidratación sin nonce) — aun así corta la
    # inyección de <script src> de terceros, el vector más común.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Uncomment once HTTPS is configured:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Login / auth: rate limit estricto (anti fuerza bruta) ─────────────────
    location /api/v1/auth/login {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Chat público: rate limit moderado ─────────────────────────────────────
    location /api/v1/widget/public/chat {
        limit_req zone=chat_zone burst=10 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache     off;
    }

    # ── API del backend ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout largo para inferencia RAG e ingesta de documentos
        proxy_read_timeout 300s;
        proxy_send_timeout 120s;

        # Sin streaming SSE: el chat responde con un único JSON completo.
        # Se mantiene buffering desactivado igual — no afecta una respuesta
        # JSON normal y evita retrasos si en el futuro se reintroduce
        # streaming en algún endpoint bajo este mismo location.
        proxy_buffering off;
        proxy_cache     off;
    }

    # ── Widget JS (servido por el backend desde /widget/) ────────────────────
    location /widget/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;

        # OJO: declarar un add_header aquí anula TODOS los headers heredados del
        # nivel server (regla de herencia de nginx). Por eso re-declaramos los
        # headers de seguridad además del Cache-Control.
        add_header X-Content-Type-Options  "nosniff"         always;
        add_header X-Frame-Options         "DENY"            always;
        add_header X-XSS-Protection        "0"               always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # widget.js tiene nombre fijo (sin hash de contenido, a propósito:
        # así el <script src> embebido en sitios de terceros no cambia con
        # cada deploy). Por eso el cache debe ser corto: un max-age largo
        # dejaría sitios con el widget embebido sirviendo una versión vieja
        # durante horas tras cada release.
        expires    5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # ── Panel de administración (Next.js) ─────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# PLANTILLA HTTPS — descomentar tras obtener certificados (certbot/Let's Encrypt)
# y montar /etc/nginx/certs en el contenedor nginx. Pasos:
#   1. Genera los certificados (ver docs/DEPLOYMENT.md).
#   2. Monta el volumen de certs en docker-compose.prod.yml (nginx.volumes).
#   3. Descomenta este bloque y cambia el `server { listen 80; }` de arriba por:
#         return 301 https://$host$request_uri;
#   4. Descomenta la línea Strict-Transport-Security de arriba.
#   5. nginx -t && reload.
#
# server {
#     listen 443 ssl;
#     http2 on;
#     server_name admin.usonsonate.edu.sv;   # ajustar al dominio real
#
#     ssl_certificate     /etc/nginx/certs/fullchain.pem;
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#     ssl_session_cache   shared:SSL:10m;
#     ssl_session_timeout 1d;
#
#     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
#
#     client_max_body_size 55m;
#
#     # Copiar aquí los mismos bloques `location` del server :80 de arriba
#     # (security headers, /api/v1/auth/login, /api/v1/widget/public/chat,
#     #  /api/, /widget/ y /). Mantener ambos sincronizados.
# }

